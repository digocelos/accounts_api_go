services:
  postgres:
    image: postgres:16
    container_name: accounts_api_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: accounts
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d accounts"]
      interval: 5s
      timeout: 3s
      retries: 20